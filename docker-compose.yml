services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: MyNewPass1
      MYSQL_DATABASE: linktask
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      DB_HOST: mysql
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
